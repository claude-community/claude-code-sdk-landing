<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row3 { display:flex; align-items:flex-end; gap: 10px; }
  .step { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background: var(--cc-orange-tint, #F4E1D6); border: 1px solid var(--cc-border); border-radius: 4px; width: 36px; }
  .lbl { font-family: var(--cc-font-mono); font-size: 10.5px; color: var(--cc-fg-3); }
  .px { font-family: var(--cc-font-mono); font-size: 11px; color: var(--cc-fg-1); font-weight:500; }
</style></head>
<body>
<div class="card">
  <div class="label-mono">4pt grid · spacing scale</div>
  <div class="row3">
    <div class="step"><div class="bar" style="height:4px"></div><div class="px">4</div><div class="lbl">--space-1</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="px">8</div><div class="lbl">--space-2</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="px">12</div><div class="lbl">--space-3</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="px">16</div><div class="lbl">--space-4</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="px">24</div><div class="lbl">--space-5</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="px">32</div><div class="lbl">--space-6</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="px">48</div><div class="lbl">--space-7</div></div>
    <div class="step"><div class="bar" style="height:64px"></div><div class="px">64</div><div class="lbl">--space-8</div></div>
    <div class="step"><div class="bar" style="height:96px"></div><div class="px">96</div><div class="lbl">--space-9</div></div>
  </div>
</div>
</body></html>
