<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .nav { display:flex; flex-direction:column; gap:2px; padding:8px; background:#FAF9F5; border:1px solid var(--cc-border); border-radius:8px; width: 260px; }
  .item { display:flex; align-items:center; gap:10px; padding: 8px 12px; border-radius:6px; font-family: var(--cc-font-sans); font-size:14px; color:#1F1E1B; cursor:pointer; position:relative; }
  .item .ic { font-family: var(--cc-font-mono); font-size: 13px; color:#8C8A82; width:18px; }
  .item:hover { background: rgba(193,95,60,0.06); }
  .item.sel { background: rgba(193,95,60,0.10); color:#9F4C2D; font-weight:500; }
  .item.sel::before { content:""; position:absolute; left:0; top:8px; bottom:8px; width:2px; background:#C15F3C; border-radius:2px; }
  .item.sel .ic { color:#C15F3C; }
  .grp { font-family: var(--cc-font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:#8C8A82; padding: 8px 12px 4px; }
  .row3 { display:flex; gap:14px }
</style></head>
<body>
<div class="card">
  <div class="row3">
    <div class="nav">
      <div class="grp">Sessions</div>
      <div class="item sel"><span class="ic">⏵</span>Active task</div>
      <div class="item"><span class="ic">▢</span>Recent</div>
      <div class="item"><span class="ic">⌖</span>Routines</div>
      <div class="grp">Workspaces</div>
      <div class="item"><span class="ic">›_</span>my-app</div>
      <div class="item"><span class="ic">›_</span>marketing-site</div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-self:flex-start">
      <div class="label-mono">Selected · accent tint + 2px left rule</div>
      <div class="label-mono" style="color:var(--cc-fg-2)">Hover · 6% accent tint</div>
      <div class="label-mono" style="color:var(--cc-fg-2)">Mono icons inherit currentColor</div>
    </div>
  </div>
</div>
</body></html>
