<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row3 { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .pill { font-family: var(--cc-font-mono); font-size: 11.5px; padding: 4px 10px; border-radius: 999px; display:inline-flex; align-items:center; gap:6px; font-weight:500; }
  .dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
  .running { background: rgba(63,124,172,0.12); color:#3F7CAC; }
  .succ { background: rgba(90,142,90,0.14); color:#3D6E3D; }
  .err { background: rgba(196,65,65,0.12); color:#C44141; }
  .warn { background: rgba(201,155,44,0.16); color:#8C6B1A; }
  .beta { background: rgba(193,95,60,0.12); color:#9F4C2D; border:1px solid rgba(193,95,60,0.25); }
  .neutral { background:#EDEBE3; color:#3D3D3A; }
  .tag { font-family: var(--cc-font-mono); font-size: 11px; padding: 2px 6px; border-radius: 3px; background:#EDEBE3; color:#3D3D3A; }
</style></head>
<body>
<div class="card">
  <div class="label-mono">Status pills · ANSI-tinted</div>
  <div class="row3">
    <span class="pill running"><span class="dot" style="background:#3F7CAC"></span>Running</span>
    <span class="pill succ"><span class="dot" style="background:#5A8E5A"></span>Succeeded</span>
    <span class="pill err"><span class="dot" style="background:#C44141"></span>Failed</span>
    <span class="pill warn"><span class="dot" style="background:#C99B2C"></span>Needs review</span>
    <span class="pill neutral"><span class="dot" style="background:#8C8A82"></span>Idle</span>
    <span class="pill beta">BETA</span>
  </div>
  <div class="label-mono">Inline tags</div>
  <div class="row3">
    <span class="tag">/rewind</span>
    <span class="tag">CLAUDE.md</span>
    <span class="tag">Sonnet 4.5</span>
    <span class="tag">main</span>
    <span class="tag">+142 −38</span>
  </div>
</div>
</body></html>
