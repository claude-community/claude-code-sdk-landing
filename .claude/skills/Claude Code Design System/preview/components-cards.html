<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card2 { background:#FAF9F5; border:1px solid var(--cc-border); border-radius:8px; padding: 18px; display:flex; flex-direction:column; gap:10px; flex:1 1 0; }
  .eyebrow { font-family: var(--cc-font-mono); font-size: 11px; letter-spacing:0.06em; text-transform:uppercase; color:#C15F3C; }
  .h { font-family: var(--cc-font-sans); font-size: 17px; font-weight:600; line-height:1.3; color:#1F1E1B; margin:0; }
  .b { font-family: var(--cc-font-sans); font-size: 13.5px; line-height:1.5; color:#3D3D3A; margin:0; }
  .ic { width:28px; height:28px; border-radius:6px; background:#1F1E1B; display:flex; align-items:center; justify-content:center; font-family: var(--cc-font-mono); font-weight:700; color:#C15F3C; font-size:13px; }
  .row3 { display:flex; gap:12px; }
</style></head>
<body>
<div class="card">
  <div class="row3">
    <div class="card2">
      <div class="ic">&gt;_</div>
      <div class="eyebrow">Terminal</div>
      <h3 class="h">Live in the shell.</h3>
      <p class="b">Run <code style="font-family:var(--cc-font-mono);font-size:0.9em">claude</code> in any project directory.</p>
    </div>
    <div class="card2">
      <div class="ic">{ }</div>
      <div class="eyebrow">SDK</div>
      <h3 class="h">Build your own agents.</h3>
      <p class="b">The Claude Agent SDK exposes the same tools that power Claude Code.</p>
    </div>
  </div>
</div>
</body></html>
