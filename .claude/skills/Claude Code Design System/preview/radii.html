<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .tile { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background: #FAF9F5; border:1px solid var(--cc-border); height: 64px; width: 100%; }
  .lbl { font-family: var(--cc-font-mono); font-size: 11px; color: var(--cc-fg-1); font-weight:500; }
  .sub { font-family: var(--cc-font-mono); font-size: 10.5px; color: var(--cc-fg-3); }
</style></head>
<body>
<div class="card">
  <div class="label-mono">Radii</div>
  <div class="grid">
    <div class="tile"><div class="box" style="border-radius:3px"></div><div class="lbl">3</div><div class="sub">xs · tags</div></div>
    <div class="tile"><div class="box" style="border-radius:6px"></div><div class="lbl">6</div><div class="sub">sm · button</div></div>
    <div class="tile"><div class="box" style="border-radius:8px"></div><div class="lbl">8</div><div class="sub">md · card</div></div>
    <div class="tile"><div class="box" style="border-radius:12px"></div><div class="lbl">12</div><div class="sub">lg · terminal</div></div>
    <div class="tile"><div class="box" style="border-radius:999px"></div><div class="lbl">999</div><div class="sub">pill</div></div>
  </div>
</div>
</body></html>
