<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#5A8E5A"></div><div class="name">ANSI Green</div><div class="hex">#5A8E5A · success</div></div>
    <div class="swatch"><div class="chip" style="background:#C44141"></div><div class="name">ANSI Red</div><div class="hex">#C44141 · error</div></div>
    <div class="swatch"><div class="chip" style="background:#C99B2C"></div><div class="name">ANSI Yellow</div><div class="hex">#C99B2C · warn</div></div>
    <div class="swatch"><div class="chip" style="background:#3F7CAC"></div><div class="name">ANSI Blue</div><div class="hex">#3F7CAC · info</div></div>
    <div class="swatch"><div class="chip" style="background:#8E5BA0"></div><div class="name">ANSI Purple</div><div class="hex">#8E5BA0 · token</div></div>
    <div class="swatch"><div class="chip" style="background:#4F9A99"></div><div class="name">ANSI Cyan</div><div class="hex">#4F9A99 · path</div></div>
  </div>
  <div class="label-mono">Status & syntax · borrowed from terminal palette</div>
</div>
</body></html>
